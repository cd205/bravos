# IBC Configuration for bravos-vm1
# SECURITY: Credentials are NEVER stored here permanently.
# The start-gateway.sh script injects IbLoginId and IbPassword
# from GCP Secret Manager at startup, then clears them on exit.
# This file contains only PLACEHOLDER values — it is safe to commit.

[IBCAlpha]
FIX=no
IbLoginId=PLACEHOLDER
IbPassword=PLACEHOLDER
TradingMode=paper
AcceptNonBrokerageAccountWarning=yes
AcceptIncomingConnectionAction=accept
MinimizeMainWindow=yes
ExistingSessionDetectedAction=primaryoverride
ReadOnlyLogin=no
